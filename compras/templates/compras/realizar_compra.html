<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Módulo de Compras</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow border-warning">
            <div class="card-header bg-warning text-dark">
                <h4 class="mb-0">Recepción de Mercancía (Compras)</h4>
            </div>
            <div class="card-body">
                
                {% if messages %}
                    {% for message in messages %}
                        <div class="alert alert-{{ message.tags }}">{{ message }}</div>
                    {% endfor %}
                {% endif %}

                <form method="POST">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label">Producto a recibir</label>
                        <select name="producto_id" class="form-select" required>
                            <option value="">-- Seleccione --</option>
                            {% for prod in productos %}
                                <option value="{{ prod.id }}">{{ prod.nombre }} (Stock actual: {{ prod.stock_actual }})</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Cantidad recibida</label>
                            <input type="number" name="cantidad" class="form-control" value="1" min="1" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Proveedor</label>
                            <input type="text" name="proveedor" class="form-control" placeholder="Ej. Distribuidora Central" required>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-warning w-100 btn-lg text-dark">Recibir Mercancía</button>
                </form>
            </div>
            <div class="card-footer">
                <a href="/admin/compras/compra/" class="text-decoration-none">Ver Historial de Compras</a>
            </div>
        </div>
    </div>
</body>
</html>
