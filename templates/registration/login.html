{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso | CrossoverSuite</title>
    <link rel="icon" type="image/png" href="{% static 'img/Logo.png' %}">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    {% load static %}
    
    <style>
        :root {
            --brand-primary: #00b8b9;
            --brand-dark: #008a8b;
            --bg-light: #f4f7f9;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-light);
            background-image: 
                radial-gradient(at 0% 0%, rgba(0, 184, 185, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(0, 86, 179, 0.05) 0px, transparent 50%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            margin: 0;
            color: #334155;
        }

        .login-card {
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 360px; /* Tamaño reducido */
            padding: 2rem;
            border: 1px solid #e2e8f0;
            animation: fadeInScale 0.5s ease-out;
        }

        @keyframes fadeInScale {
            from { transform: scale(0.98); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .login-logo {
            display: block;
            margin: 0 auto 1.2rem;
            max-width: 140px; /* Logo un poco más pequeño */
            height: auto;
        }

        .login-title {
            font-weight: 700;
            color: #1e293b;
            text-align: center;
            margin-bottom: 0.25rem;
            letter-spacing: -0.5px;
            font-size: 1.5rem;
        }

        .login-subtitle {
            text-align: center;
            color: #64748b;
            font-size: 0.85rem;
            margin-bottom: 2rem;
            font-weight: 500;
        }

        .form-label {
            font-weight: 600;
            font-size: 0.75rem;
            color: #475569;
            margin-bottom: 0.4rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .input-group {
            background: #ffffff;
            border-radius: 10px;
            border: 1.5px solid #e2e8f0;
            transition: all 0.2s ease;
        }

        .input-group:focus-within {
            border-color: var(--brand-primary);
            box-shadow: 0 0 0 3px rgba(0, 184, 185, 0.1);
        }

        .input-group-text {
            background: transparent;
            border: none;
            color: #94a3b8;
            padding-left: 0.8rem;
        }

        .form-control {
            background: transparent;
            border: none;
            color: #1e293b;
            padding: 0.65rem 0.8rem 0.65rem 0.4rem;
            font-size: 0.9rem;
        }

        .form-control::placeholder {
            color: #cbd5e1;
        }

        .form-control:focus {
            box-shadow: none;
        }

        .btn-login {
            background: var(--brand-primary);
            color: white;
            border: none;
            padding: 0.75rem;
            border-radius: 10px;
            font-weight: 600;
            width: 100%;
            margin-top: 1.5rem;
            transition: all 0.2s ease;
            font-size: 0.9rem;
        }

        .btn-login:hover {
            background: var(--brand-dark);
            transform: translateY(-1px);
            color: white;
        }

        .alert-error {
            background: #fff1f2;
            color: #e11d48;
            border: 1px solid #fecdd3;
            border-radius: 10px;
            padding: 0.6rem;
            font-size: 0.8rem;
            margin-bottom: 1.2rem;
            display: flex;
            align-items: center;
        }

        .footer-text {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.75rem;
            color: #94a3b8;
        }

        .link-brand {
            color: var(--brand-primary);
            text-decoration: none;
            font-weight: 500;
        }

        .link-brand:hover {
            color: var(--brand-dark);
        }
    </style>
</head>
<body>

    <div class="login-card">
        <img src="{% static 'img/Logo.png' %}" alt="CrossoverSuite Logo" class="login-logo">
        
        <h3 class="login-title">Acceso</h3>
        <p class="login-subtitle">CrossoverSuite</p>

        {% if form.errors %}
            <div class="alert-error">
                <i class="bi bi-shield-lock me-2"></i>
                Credenciales incorrectas.
            </div>
        {% endif %}

        <form method="post" action="{% url 'login' %}">
            {% csrf_token %}
            
            <div class="mb-3">
                <label for="id_username" class="form-label">Usuario</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" name="username" id="id_username" class="form-control" placeholder="nombre@dominio" required autofocus>
                </div>
            </div>

            <div class="mb-3">
                <label for="id_password" class="form-label">Contraseña</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-key"></i></span>
                    <input type="password" name="password" id="id_password" class="form-control" placeholder="••••••••" required>
                </div>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-1">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="rememberMe">
                    <label class="form-check-label small text-muted" for="rememberMe" style="font-size: 0.75rem;">Mantener sesión</label>
                </div>
                <a href="#" class="link-brand" style="font-size: 0.75rem;">¿Olvidaste tu clave?</a>
            </div>

            <button type="submit" class="btn btn-login">
                Entrar ahora <i class="bi bi-chevron-right ms-1 small"></i>
            </button>

            <input type="hidden" name="next" value="{{ next }}">
        </form>

        <p class="footer-text">
            CrossoverSuite {% now "Y" %} <br>
            Soporte: <a href="mailto:soporte@crossovermx.com" class="link-brand">soporte@crossovermx.com</a>
        </p>
    </div>

</body>
</html>
