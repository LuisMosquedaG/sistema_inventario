<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estado del Servicio - Crossover Suite</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .error-card { max-width: 500px; border: none; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .btn-brand { background-color: #00b8b9; color: white; border: none; padding: 10px 25px; border-radius: 8px; font-weight: 600; }
        .btn-brand:hover { background-color: #008a8b; color: white; }
    </style>
</head>
<body>
    <div class="container text-center">
        <div class="card error-card mx-auto p-4 p-md-5">
            <div class="mb-4">
                {% if empresa.logo %}
                    <img src="{{ empresa.logo.url }}" alt="Logo" style="max-height: 80px;" class="mb-3">
                {% else %}
                    <i class="bi bi-exclamation-triangle-fill text-warning" style="font-size: 4rem;"></i>
                {% endif %}
            </div>
            <h3 class="fw-bold text-dark mb-3">{{ empresa.nombre }}</h3>
            <div class="alert alert-light border-0 py-3 mb-4" style="background-color: #fff9f0; color: #856404;">
                <i class="bi bi-info-circle-fill me-2"></i> {{ mensaje }}
            </div>
            <div class="d-grid gap-2">
                <a href="/login/" class="btn btn-brand">
                    <i class="bi bi-box-arrow-in-left me-2"></i> Volver a Iniciar Sesión
                </a>
                <p class="text-muted small mt-3 mb-0">Si cree que esto es un error, por favor contacte a soporte técnico.</p>
            </div>
        </div>
        <div class="mt-4">
            <img src="/static/img/logo_horizontal.png" alt="Crossover Suite" style="height: 25px; opacity: 0.5;">
        </div>
    </div>
</body>
</html>
