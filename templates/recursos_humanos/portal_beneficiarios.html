{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container-fluid py-4">
    <!-- CABECERA -->
    <div class="row mb-4">
        <div class="col-12">
            <div class="card border-0 shadow-sm rounded-3 overflow-hidden bg-white">
                <div class="card-body p-4 border-start border-5 border-brand" style="border-left-color: var(--brand-color) !important;">
                    <div class="d-flex align-items-center justify-content-between flex-wrap gap-3">
                        <div class="d-flex align-items-center">
                            <div class="me-3" style="color: var(--brand-color);">
                                <i class="bi bi-folder-check fs-2"></i>
                            </div>
                            <div>
                                <h4 class="fw-bold mb-1 text-dark">Portal de Documentación</h4>
                                <p class="text-muted mb-0 small">Bienvenido, <strong class="text-brand">{{ beneficiario.nombre_razon_social }}</strong>. Aquí puedes consultar y descargar tu documentación mensual.</p>
                            </div>
                        </div>
                        <div class="d-flex align-items-center gap-2">
                            <label class="small fw-bold text-secondary mb-0">Año fiscal:</label>
                            <select id="selectAnioDoc" class="form-select form-select-sm border fw-bold text-dark rounded" style="width: 100px; cursor: pointer;" onchange="cargarMatrizDocumentos()">
                                {% for y in anios_disponibles %}
                                    <option value="{{ y }}" {% if y == anio_seleccionado %}selected{% endif %}>{{ y }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- TABLA DE DOCUMENTOS -->
    <div class="row">
        <div class="col-12">
            <div class="card border-0 shadow-sm rounded-3 bg-white">
                <div class="card-header bg-white py-3 border-bottom">
                    <h5 class="fw-bold mb-0 text-dark"><i class="bi bi-file-earmark-spreadsheet me-2 text-muted"></i>Documentos por Mes</h5>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-bordered table-hover align-middle mb-0" style="font-size: 0.8rem;">
                            <thead class="table-light text-center">
                                <tr>
                                    <th class="align-middle px-3 py-3 text-start" style="width: 250px; font-weight: 600; color: #495057;">Documento</th>
                                    <th style="width: 75px; font-weight: 500;">Ene</th>
                                    <th style="width: 75px; font-weight: 500;">Feb</th>
                                    <th style="width: 75px; font-weight: 500;">Mar</th>
                                    <th style="width: 75px; font-weight: 500;">Abr</th>
                                    <th style="width: 75px; font-weight: 500;">May</th>
                                    <th style="width: 75px; font-weight: 500;">Jun</th>
                                    <th style="width: 75px; font-weight: 500;">Jul</th>
                                    <th style="width: 75px; font-weight: 500;">Ago</th>
                                    <th style="width: 75px; font-weight: 500;">Sep</th>
                                    <th style="width: 75px; font-weight: 500;">Oct</th>
                                    <th style="width: 75px; font-weight: 500;">Nov</th>
                                    <th style="width: 75px; font-weight: 500;">Dic</th>
                                </tr>
                            </thead>
                            <tbody id="bodyMatrizDoc">
                                <!-- Se llena vía AJAX -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const currentBenId = "{{ beneficiario.id }}";

    function getIconByFilename(filename) {
        if (!filename) return 'bi-file-earmark text-secondary';
        const ext = filename.split('.').pop().toLowerCase();
        if (ext === 'pdf') return 'bi-file-earmark-pdf text-danger';
        if (['xlsx', 'xls', 'csv'].includes(ext)) return 'bi-file-earmark-excel text-success';
        if (['docx', 'doc'].includes(ext)) return 'bi-file-earmark-word text-primary';
        if (['jpg', 'jpeg', 'png', 'webp', 'gif'].includes(ext)) return 'bi-file-earmark-image text-info';
        return 'bi-file-earmark text-secondary';
    }

    function cargarMatrizDocumentos() {
        const anio = document.getElementById('selectAnioDoc').value;
        const body = document.getElementById('bodyMatrizDoc');
        body.innerHTML = '<tr><td colspan="13" class="text-center py-5 text-muted"><div class="spinner-border spinner-border-sm text-brand mb-2"></div><br>Cargando matriz de documentos...</td></tr>';

        fetch(`/recursos-humanos/beneficiarios/documentacion/obtener/${currentBenId}/?anio=${anio}`)
        .then(r => r.json())
        .then(data => {
            if(data.success) {
                let html = '';
                data.matrix.forEach(row => {
                    html += `<tr>
                        <td class="fw-bold px-3 py-3 bg-white text-dark" style="font-size:0.85rem;">${row.nombre}</td>`;
                    for(let m=1; m<=12; m++) {
                        const doc = row.meses[m];
                        if(doc.id) {
                            const iconClass = getIconByFilename(doc.nombre_archivo);
                            html += `<td class="text-center align-middle p-0" style="background-color: #f8fdfb;">
                                <a href="${doc.url}" target="_blank" class="d-block p-3 text-decoration-none" title="Descargar: ${doc.nombre_archivo}">
                                    <i class="bi ${iconClass} fs-4"></i>
                                    <span class="d-block mt-1 text-muted" style="font-size: 0.65rem; max-width: 70px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin: 0 auto;">${doc.nombre_archivo}</span>
                                </a>
                            </td>`;
                        } else {
                            html += `<td class="text-center align-middle p-0 text-muted bg-light bg-opacity-50">
                                <span style="font-size: 0.7rem; color: #adb5bd;">-</span>
                            </td>`;
                        }
                    }
                    html += `</tr>`;
                });
                body.innerHTML = html;
            } else {
                body.innerHTML = `<tr><td colspan="13" class="text-center py-4 text-danger">Error: ${data.error}</td></tr>`;
            }
        })
        .catch(err => {
            console.error(err);
            body.innerHTML = '<tr><td colspan="13" class="text-center py-4 text-danger">Ocurrió un error al cargar la información.</td></tr>';
        });
    }

    document.addEventListener("DOMContentLoaded", function() {
        cargarMatrizDocumentos();
    });
</script>
{% endblock %}
