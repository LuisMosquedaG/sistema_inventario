<div class="modal fade" id="modalListaPrecios" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg modal-sheet">
        <div class="modal-content">
            <div class="modal-header border-bottom bg-light py-2"> 
                <h5 class="modal-title fw-bold">Lista de Precios y Costos</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            
            <div class="modal-body bg-light">
                <!-- SECCIÓN 1: DATOS GENERALES -->
                <div class="card border-0 shadow-sm mb-3">
                    <div class="card-body p-3">
                        <div class="row g-2">
                            <div class="col-md-12">
                                <label class="small text-muted mb-1">Artículo</label>
                                <div class="fw-bold text-dark fs-5" id="lpNombre">-</div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- TABS -->
                <ul class="nav nav-tabs nav-fill mb-3" id="lpTab" role="tablist">
                    <li class="nav-item">
                        <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tab-precios" type="button">Precios</button>
                    </li>
                    <li class="nav-item">
                        <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-costos" type="button">Costos</button>
                    </li>
                </ul>

                <div class="tab-content">
                    <div class="tab-pane fade show active" id="tab-precios">
                        <div class="card border-0 shadow-sm mb-3">
                            <div class="card-body p-3">
                                <div class="d-flex justify-content-between align-items-center mb-2">
                                    <label class="fw-bold text-secondary small">Costo Base</label>
                                    <input type="number" step="0.01" id="lpBaseCosto" class="form-control form-control-sm text-end" style="max-width: 150px;">
                                </div>
                                <div class="table-responsive">
                                    <table class="table table-sm table-hover align-middle mb-0">
                                        <thead class="table-light">
                                            <tr>
                                                <th>Nombre del Precio</th>
                                                <th class="text-end">Monto ($)</th>
                                                <th style="width: 40px;"></th>
                                            </tr>
                                        </thead>
                                        <tbody id="lpTablaPrecios"></tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="tab-pane fade" id="tab-costos">
                        <div class="card border-0 shadow-sm mb-3">
                            <div class="card-body p-3">
                                <div class="d-flex justify-content-between align-items-center mb-2">
                                    <label class="fw-bold text-secondary small">Precio Base</label>
                                    <input type="number" step="0.01" id="lpBaseVenta" class="form-control form-control-sm text-end" style="max-width: 150px;">
                                </div>
                                <div class="table-responsive">
                                    <table class="table table-sm table-hover align-middle mb-0">
                                        <thead class="table-light">
                                            <tr>
                                                <th>Nombre del Costo</th>
                                                <th class="text-end">Monto ($)</th>
                                                <th style="width: 40px;"></th>
                                            </tr>
                                        </thead>
                                        <tbody id="lpTablaCostos"></tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="modal-footer border-top bg-white py-2">
                <button type="button" class="btn btn-light text-secondary btn-sm" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-brand btn-sm px-4" onclick="guardarCambiosListaPrecios()">Guardar Cambios</button>
            </div>
        </div>
    </div>
</div>
