<div class="modal fade" id="modalListaPrecios" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg modal-sheet">
        <div class="modal-content">
            <style>
                /* ESTILO DE PESTAÑAS FANTASMA */
                #lpTab .nav-link {
                    color: #adb5bd !important;
                    border: none;
                    border-bottom: 2px solid transparent;
                    transition: all 0.3s ease;
                    font-weight: 500;
                    opacity: 0.6;
                }
                #lpTab .nav-link:hover {
                    opacity: 1;
                    color: #6c757d !important;
                }
                #lpTab .nav-link.active {
                    color: #00b8b9 !important;
                    opacity: 1;
                    background: transparent;
                    border-bottom: 2px solid #00b8b9;
                    font-weight: 600;
                }
            </style>
            <div class="modal-header border-bottom bg-light py-2"> 
                <h5 class="modal-title fw-bold">Lista de Precios y Costos</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            
            <div class="modal-body bg-light">
                <!-- SECCIÓN 1: DATOS GENERALES -->
                <div class="card border-0 shadow-sm mb-3">
                    <div class="card-body p-3">
                        <div class="row g-2">
                            <div class="col-md-12">
                                <label class="small text-muted mb-1">Artículo</label>
                                <div class="fw-bold text-dark fs-5" id="lpNombre">-</div>
                                <!-- Campos ocultos para mantener valores base -->
                                <input type="hidden" id="lpBaseCosto" value="0">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- TABS -->
                <ul class="nav nav-tabs nav-fill mb-3" id="lpTab" role="tablist">
                    <li class="nav-item">
                        <button class="nav-link active" id="precios-tab" data-bs-toggle="tab" data-bs-target="#tab-precios" type="button">Precios de lista</button>
                    </li>
                    <li class="nav-item">
                        <button class="nav-link" id="costos-tab" data-bs-toggle="tab" data-bs-target="#tab-costos" type="button">Costos de lista</button>
                    </li>
                </ul>

                <div class="tab-content">
                    <!-- PESTAÑA PRECIOS -->
                    <div class="tab-pane fade show active" id="tab-precios">
                        <div class="card border-0 shadow-sm mb-3">
                            <div class="card-body p-3">
                                <div class="row align-items-center mb-3">
                                    <div class="col-md-6">
                                        <label class="fw-bold text-secondary small d-block">Costo Base (Informativo)</label>
                                        <div class="text-dark fw-bold" style="font-size: 1.1rem;">$ <span id="infoCostoBase">0.00</span></div>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="fw-bold text-brand small d-block">Precio de Venta Base (Editable)</label>
                                        <div class="input-group input-group-sm" style="max-width: 200px;">
                                            <span class="input-group-text bg-brand text-white border-brand">$</span>
                                            <input type="number" step="0.01" id="lpBaseVenta" class="form-control text-end border-brand fw-bold" oninput="syncPreciosCostos(); recalcularMargenes();">
                                        </div>
                                    </div>
                                </div>

                                <div class="d-flex justify-content-between align-items-center mb-2 mt-4">
                                    <h6 class="mb-0 text-dark fw-bold small">Precios de Lista Adicionales</h6>
                                    <button type="button" class="btn btn-brand btn-sm" onclick="agregarFilaPrecio()">
                                        <i class="bi bi-plus-lg"></i> Agregar Precio
                                    </button>
                                </div>

                                <div class="table-responsive">
                                    <table class="table table-sm table-hover align-middle mb-0">
                                        <thead class="table-light">
                                            <tr>
                                                <th class="ps-3">Nombre del Precio</th>
                                                <th class="text-center" style="width: 110px;">Monto ($)</th>
                                                <th class="text-center" style="width: 90px;">IVA</th>
                                                <th class="text-center" style="width: 110px;">Total</th>
                                                <th class="text-center" style="width: 90px;">Margen %</th>
                                                <th style="width: 40px;"></th>
                                            </tr>
                                        </thead>
                                        <tbody id="lpTablaPrecios"></tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- PESTAÑA COSTOS -->
                    <div class="tab-pane fade" id="tab-costos">
                        <div class="card border-0 shadow-sm mb-3">
                            <div class="card-body p-3">
                                <div class="row align-items-center mb-3">
                                    <div class="col-md-6">
                                        <label class="fw-bold text-secondary small d-block">Costo Base (Informativo)</label>
                                        <div class="text-dark fw-bold" style="font-size: 1.1rem;">$ <span id="infoCostoBaseCosts">0.00</span></div>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="fw-bold text-secondary small d-block">Precio de Venta Base (Editable)</label>
                                        <div class="input-group input-group-sm" style="max-width: 200px;">
                                            <span class="input-group-text bg-light text-secondary border border-secondary-subtle">$</span>
                                            <input type="number" step="0.01" id="lpBaseVentaCosts" class="form-control text-end border border-secondary-subtle fw-bold" oninput="syncInputs('lpBaseVentaCosts', 'lpBaseVenta'); syncPreciosCostos(); recalcularMargenes();">
                                        </div>
                                    </div>
                                </div>

                                <div class="d-flex justify-content-between align-items-center mb-2 mt-4">
                                    <h6 class="mb-0 text-dark fw-bold small">Costos de Lista Adicionales</h6>
                                    <button type="button" class="btn btn-brand btn-sm" onclick="agregarFilaCosto()">
                                        <i class="bi bi-plus-lg"></i> Agregar Costo
                                    </button>
                                </div>
                                <div class="table-responsive">
                                    <table class="table table-sm table-hover align-middle mb-0">
                                        <thead class="table-light">
                                            <tr>
                                                <th class="ps-3">Nombre del Costo / Gasto</th>
                                                <th class="text-center" style="width: 110px;">Monto ($)</th>
                                                <th class="text-center" style="width: 90px;">IVA</th>
                                                <th class="text-center" style="width: 110px;">Total</th>
                                                <th class="text-center" style="width: 90px;">Margen %</th>
                                                <th style="width: 40px;"></th>
                                            </tr>
                                        </thead>
                                        <tbody id="lpTablaCostos"></tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="modal-footer border-top bg-white py-2">
                <button type="button" class="btn btn-light text-secondary btn-sm" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-brand btn-sm px-4" onclick="guardarCambiosListaPrecios()">Guardar Cambios</button>
            </div>
        </div>
    </div>
</div>
