<div class="modal fade" id="modalListaPrecios" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg modal-sheet">
        <div class="modal-content">
            
            <div class="modal-header border-bottom bg-light py-2"> 
                <h5 class="modal-title fw-bold">
                    <i class="bi bi-tags-fill me-2 text-brand"></i>Lista de Precios y Costos
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            
            <div class="modal-body p-3 bg-light">
                
                <!-- SECCIÓN 1: DATOS GENERALES (Solo Lectura) -->
                <div class="card border-0 shadow-sm mb-3">
                    <div class="card-body p-2">
                        <div class="row g-2">
                            <div class="col-md-6">
                                <label class="small text-muted mb-1">Artículo</label>
                                <div class="fw-bold text-dark fs-5" id="lpNombre">-</div>
                            </div>
                            <div class="col-md-3">
                                <label class="small text-muted mb-1">Clave / ID</label>
                                <div class="fw-bold text-secondary" id="lpClave">-</div>
                            </div>
                            <div class="col-md-3">
                                <label class="small text-muted mb-1">Unidad</label>
                                <div class="fw-bold text-secondary" id="lpUnidad">-</div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- TABS DE NAVEGACIÓN -->
                <ul class="nav nav-tabs nav-fill mb-3" id="lpTab" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active rounded-0" id="tab-precios-tab" data-bs-toggle="tab" data-bs-target="#tab-precios" type="button">
                            Lista de Precios
                        </button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link rounded-0" id="tab-costos-tab" data-bs-toggle="tab" data-bs-target="#tab-costos" type="button">
                            Lista de Costos
                        </button>
                    </li>
                </ul>

                <div class="tab-content" id="lpTabContent">
                    
                    <!-- TAB 1: LISTA DE PRECIOS -->
                    <div class="tab-pane fade show active" id="tab-precios" role="tabpanel">
                        
                        <!-- SECCIÓN 1: CONFIGURACIÓN BASE (Costo Preconfigurado) -->
                        <div class="card border-0 shadow-sm mb-3 bg-white">
                            <div class="card-body p-2 d-flex align-items-center justify-content-between">
                                <div>
                                    <label class="form-label small fw-bold text-secondary mb-0">Costo (Base)</label>
                                </div>
                                <div class="d-flex align-items-center">
                                    <span class="me-2 text-muted small">$</span>
                                    <input type="number" step="0.01" id="lpBaseCosto" class="form-control form-control-sm text-end fw-bold" style="max-width: 150px;">
                                </div>
                            </div>
                        </div>

                        <!-- SECCIÓN 2: AGREGAR PRECIO (CON BORDE AZUL Y BOTÓN +) -->
                        <div class="card border-0 shadow-sm mb-3 bg-white" style="border-left: 4px solid #00b8b9 !important;">
                            <div class="card-body p-2">
                                <h6 class="text-uppercase text-muted fw-bold mb-2" style="font-size: 0.7rem; letter-spacing: 1px;">Agregar Nuevo Precio</h6>
                                <div class="row g-2 align-items-end">
                                    <div class="col-md-5">
                                        <label class="form-label small text-muted mb-0">Nombre del Precio</label>
                                        <input type="text" id="nuevoPrecioNombre" class="form-control form-control-sm" placeholder="Ej. Mayoreo">
                                    </div>
                                    <div class="col-md-2">
                                        <label class="form-label small text-muted mb-0">Precio Lista</label>
                                        <input type="number" step="0.01" id="nuevoPrecioMonto" class="form-control form-control-sm text-end" placeholder="0.00" oninput="actualizarVistaPreviaAgregar()">
                                    </div>
                                    <div class="col-md-2">
                                        <label class="form-label small text-muted mb-0">Margen %</label>
                                        <div class="form-control form-control-sm bg-light border-0 text-muted text-end small font-mono" id="prevMargen">0.00%</div>
                                    </div>
                                    <div class="col-md-2">
                                        <label class="form-label small text-muted mb-0">Ganancia $</label>
                                        <div class="form-control form-control-sm bg-light border-0 text-success text-end small font-mono fw-bold" id="prevGanancia">$0.00</div>
                                    </div>
                                    <div class="col-md-1 text-center">
                                        <!-- BOTÓN CUADRADO -->
                                        <button type="button" 
                                                class="btn btn-brand btn-sm" 
                                                onclick="agregarPrecioLista()" 
                                                title="Agregar Precio"
                                                style="width: 31px; height: 31px; padding: 0; display: flex; align-items: center; justify-content: center;">
                                            <i class="bi bi-plus-lg"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- SECCIÓN 3: TABLA -->
                        <div class="card border-0 shadow-sm">
                            <div class="card-body p-0">
                                <div class="table-responsive bg-white rounded">
                                    <table class="table table-sm table-hover mb-0 align-middle">
                                        <thead class="table-light">
                                            <tr>
                                                <th class="ps-3 fw-bold text-secondary">Nombre del Precio</th>
                                                <th class="text-center fw-bold text-secondary" style="width: 150px;">Monto ($)</th>
                                                <th class="text-center fw-bold text-secondary" style="width: 120px;">Margen (%)</th>
                                                <th class="text-end fw-bold text-secondary pe-3" style="width: 150px;">Ganancia ($)</th>
                                                <th style="width: 50px;"></th>
                                            </tr>
                                        </thead>
                                        <tbody id="lpTablaPrecios">
                                            <!-- Filas dinámicas -->
                                        </tbody>
                                    </table>
                                </div>
                                <div id="msgSinPrecios" class="text-center py-3 text-muted small fst-italic bg-light">
                                    No hay precios de lista registrados.
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- TAB 2: LISTA DE COSTOS -->
                    <div class="tab-pane fade" id="tab-costos" role="tabpanel">
                        
                        <!-- SECCIÓN 1: CONFIGURACIÓN BASE (Venta Editable) -->
                        <div class="card border-0 shadow-sm mb-3 bg-white">
                            <div class="card-body p-2 d-flex align-items-center justify-content-between">
                                <div>
                                    <label class="form-label small fw-bold text-secondary mb-0">Precio (Base)</label>
                                </div>
                                <div class="d-flex align-items-center">
                                    <span class="me-2 text-muted small">$</span>
                                    <input type="number" step="0.01" id="lpBaseVenta" class="form-control form-control-sm text-end fw-bold" style="max-width: 150px;">
                                </div>
                            </div>
                        </div>

                        <!-- SECCIÓN 2: AGREGAR COSTO (CON BORDE AZUL Y BOTÓN + CUADRADO) -->
                        <div class="card border-0 shadow-sm mb-3 bg-white" style="border-left: 4px solid #00b8b9 !important;">
                            <div class="card-body p-2">
                                <h6 class="text-uppercase text-muted fw-bold mb-2" style="font-size: 0.7rem; letter-spacing: 1px;">Agregar Nuevo Costo</h6>
                                <div class="row g-2 align-items-end">
                                    <div class="col-md-5">
                                        <label class="form-label small text-muted mb-0">Nombre del Costo</label>
                                        <input type="text" id="nuevoCostoNombre" class="form-control form-control-sm" placeholder="Ej. Proveedor A">
                                    </div>
                                    <div class="col-md-2">
                                        <label class="form-label small text-muted mb-0">Costo Monto</label>
                                        <input type="number" step="0.01" id="nuevoCostoMonto" class="form-control form-control-sm text-end" placeholder="0.00" oninput="actualizarVistaPreviaAgregarCosto()">
                                    </div>
                                    <div class="col-md-2">
                                        <label class="form-label small text-muted mb-0">Margen %</label>
                                        <div class="form-control form-control-sm bg-light border-0 text-muted text-end small font-mono" id="prevMargenCosto">0.00%</div>
                                    </div>
                                    <div class="col-md-2">
                                        <label class="form-label small text-muted mb-0">Ganancia $</label>
                                        <div class="form-control form-control-sm bg-light border-0 text-success text-end small font-mono fw-bold" id="prevGananciaCosto">$0.00</div>
                                    </div>
                                    <div class="col-md-1 text-center">
                                        <!-- BOTÓN + CUADRADO -->
                                        <button type="button" class="btn btn-brand btn-sm" onclick="agregarCostoLista()" title="Agregar Costo" style="width: 31px; height: 31px; padding: 0; display: flex; align-items: center; justify-content: center;">
                                            <i class="bi bi-plus-lg"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- SECCIÓN 3: TABLA COSTOS -->
                        <div class="card border-0 shadow-sm">
                            <div class="card-body p-0">
                                <div class="table-responsive bg-white rounded">
                                    <table class="table table-sm table-hover mb-0 align-middle">
                                        <thead class="table-light">
                                            <tr>
                                                <th class="ps-3 fw-bold text-secondary">Nombre del Costo</th>
                                                <th class="text-center fw-bold text-secondary" style="width: 150px;">Monto ($)</th>
                                                <th class="text-center fw-bold text-secondary" style="width: 120px;">Margen (%)</th>
                                                <th class="text-end fw-bold text-secondary pe-3" style="width: 150px;">Ganancia ($)</th>
                                                <th style="width: 50px;"></th> 
                                            </tr>
                                        </thead>
                                        <tbody id="lpTablaCostos">
                                            <!-- Filas dinámicas -->
                                        </tbody>
                                    </table>
                                </div>
                                <div id="msgSinCostos" class="text-center py-3 text-muted small fst-italic bg-light">
                                    No hay costos registrados.
                                </div>
                            </div>
                        </div>
                    </div>

                </div>

            </div>
            
            <div class="modal-footer border-top bg-white py-2">
                <button type="button" class="btn btn-light text-secondary btn-sm" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-brand btn-sm px-4" onclick="guardarCambiosListaPrecios()">
                    <i class="bi bi-save me-1"></i> Guardar Cambios
                </button>
            </div>
        </div>
    </div>
</div>
