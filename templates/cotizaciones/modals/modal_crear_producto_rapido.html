<!-- MODAL: CREAR PRODUCTO RÁPIDO -->
<div class="modal fade" id="modalCrearProductoRapido" tabindex="-1" aria-hidden="true" style="z-index: 1060;">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content shadow-lg border-0">
            <div class="modal-header bg-light border-bottom">
                <h6 class="modal-title fw-bold text-dark">
                    <i class="bi bi-box-seam-fill me-2 text-brand"></i>Alta Rápida de Producto
                </h6>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-4">
                <form id="formProductoRapido" method="post" action="{% url 'crear_producto_rapido' %}">
                    {% csrf_token %}
                    <input type="hidden" name="sucursal" value="{{ filtros.sucursal|default:'' }}">
                    
                    <div class="mb-3">
                        <label class="form-label small fw-bold text-secondary">Nombre del Producto</label>
                        <input type="text" name="nombre" class="form-control form-control-sm" placeholder="Ej: Laptop Dell XPS 13" required>
                    </div>

                    <div class="row g-3 mb-3">
                        <div class="col-6">
                            <label class="form-label small fw-bold text-secondary">Tipo</label>
                            <select name="tipo" class="form-select form-select-sm" required>
                                <option value="producto" selected>Producto</option>
                                <option value="servicio">Servicio</option>
                            </select>
                        </div>
                        <div class="col-6">
                            <label class="form-label small fw-bold text-secondary">Abastecimiento</label>
                            <select name="tipo_abastecimiento" class="form-select form-select-sm" required>
                                <option value="compra" selected>Compra</option>
                                <option value="stock">Stock</option>
                                <option value="produccion">Producción</option>
                            </select>
                        </div>
                    </div>

                    <div class="row g-3 mb-3">
                        <div class="col-6">
                            <label class="form-label small fw-bold text-secondary">Categoría</label>
                            <select name="categoria" id="quick_product_categoria" class="form-select form-select-sm" onchange="actualizarSubcategoriasRapido()">
                                <option value="">Seleccionar...</option>
                                {% for cat in categorias_catalogo %}
                                    <option value="{{ cat.id }}">{{ cat.nombre }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-6">
                            <label class="form-label small fw-bold text-secondary">Subcategoría</label>
                            <select name="subcategoria" id="quick_product_subcategoria" class="form-select form-select-sm" disabled>
                                <option value="">Selecciona categoría...</option>
                            </select>
                        </div>
                    </div>

                    <script>
                        function actualizarSubcategoriasRapido() {
                            const catId = document.getElementById('quick_product_categoria').value;
                            const selectSub = document.getElementById('quick_product_subcategoria');
                            
                            if (!catId) {
                                selectSub.innerHTML = '<option value="">Selecciona categoría...</option>';
                                selectSub.disabled = true;
                                return;
                            }

                            // Usamos el endpoint de detalle de categoría que ya trae las subcategorías
                            fetch(`/inventario/api/categoria/${catId}/`)
                                .then(r => r.json())
                                .then(data => {
                                    selectSub.innerHTML = '<option value="">Seleccionar...</option>';
                                    if (data.subcategorias) {
                                        data.subcategorias.forEach(s => {
                                            selectSub.insertAdjacentHTML('beforeend', `<option value="${s.nombre}">${s.nombre}</option>`);
                                        });
                                    }
                                    selectSub.disabled = false;
                                })
                                .catch(err => {
                                    console.error("Error al cargar subcategorías:", err);
                                    selectSub.innerHTML = '<option value="">Error al cargar</option>';
                                });
                        }
                    </script>

                    <!-- Campos ocultos necesarios para el modelo que no se piden en el form rápido -->
                    <input type="hidden" name="precio_costo" value="0.00">
                    <input type="hidden" name="precio_venta" value="0.00">
                    <input type="hidden" name="estado" value="activo">
                </form>
            </div>
            <div class="modal-footer bg-light border-top p-2">
                <button type="button" class="btn btn-sm btn-light text-secondary px-3" data-bs-dismiss="modal">Cancelar</button> 
                <button type="button" onclick="guardarProductoRapido()" class="btn btn-sm btn-brand px-4 fw-bold">Guardar Producto</button>
            </div>
        </div>
    </div>
</div>

<script>
    function guardarProductoRapido() {
        const form = document.getElementById('formProductoRapido');
        const formData = new FormData(form);
        const btn = event.currentTarget;
        const originalText = btn.innerText;

        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Guardando...';

        fetch(form.action, {
            method: 'POST',
            body: formData,
            headers: {
                'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
            }
        })
        .then(r => r.json())
        .then(data => {
            if (data.success) {
                // 1. Agregar a la lista de productos del modal de cotización
                const wrapperP = document.getElementById('wrapperProductoAgregar');
                if (wrapperP) {
                    const containerOptions = wrapperP.querySelector('.custom-options');
                    const newOption = document.createElement('span');
                    newOption.className = 'custom-option';
                    newOption.setAttribute('data-value', data.id);
                    newOption.setAttribute('data-precio', data.precio_venta);
                    newOption.setAttribute('data-iva', data.iva);
                    newOption.setAttribute('data-search', data.nombre);
                    newOption.setAttribute('title', data.nombre);
                    newOption.innerText = data.nombre;
                    
                    // Agregar evento click a la nueva opción
                    newOption.addEventListener('click', function() {
                        const opts = containerOptions.querySelectorAll('.custom-option');
                        opts.forEach(o => o.classList.remove('selected'));
                        this.classList.add('selected');
                        
                        const fakeP = document.getElementById('producto_display_fake');
                        const hidP = document.getElementById('selectProductoAgregar');
                        const inpP = document.getElementById('producto_busqueda');
                        
                        fakeP.innerHTML = this.innerHTML;
                        fakeP.setAttribute('title', this.textContent.trim());
                        inpP.value = '';
                        hidP.value = data.id;
                        hidP.setAttribute('data-base-precio', data.precio_venta);
                        
                        document.getElementById('inputPrecioAgregar').value = data.precio_venta;
                        
                        const selP = wrapperP.querySelector('.custom-select');
                        selP.classList.remove('open');
                        fakeP.style.opacity = "1";
                    });

                    containerOptions.appendChild(newOption);
                    newOption.click();
                }

                // 2. SOPORTE PARA MODAL DE SOLICITUDES DE COMPRA
                const wrapperSol = document.getElementById('wrapperAddProducto');
                if (wrapperSol) {
                    const containerOptions = wrapperSol.querySelector('.custom-options');
                    const newOption = document.createElement('span');
                    newOption.className = 'custom-option';
                    newOption.setAttribute('data-value', data.id);
                    newOption.setAttribute('data-name', data.nombre);
                    newOption.setAttribute('data-precio', data.precio_costo);
                    newOption.setAttribute('data-iva', data.iva);
                    newOption.setAttribute('data-search', data.nombre);
                    newOption.setAttribute('title', data.nombre);
                    newOption.innerText = data.nombre;

                    newOption.addEventListener('click', (e) => {
                        const option = e.target.closest('.custom-option');
                        const valId = option.getAttribute('data-value');
                        const valText = (option.getAttribute('data-name') || option.textContent).trim();

                        document.getElementById('add_producto').value = valId;
                        document.getElementById('add_producto_display_fake').innerText = valText;
                        document.getElementById('add_producto_busqueda').value = ''; 
                        
                        const selectDiv = wrapperSol.querySelector('.custom-select');
                        selectDiv.classList.remove('open');
                        
                        // Disparar cambio para actualizar costo
                        document.getElementById('add_producto').dispatchEvent(new Event('change'));
                    });

                    containerOptions.appendChild(newOption);
                    newOption.click();

                    // AUTOMÁTICAMENTE AGREGAR AL LISTADO (TABLA)
                    if (typeof agregarArticuloManual === 'function') {
                        setTimeout(() => {
                            agregarArticuloManual();
                        }, 100);
                    }
                }

                // 3. Cerrar modal y limpiar
                const modalEl = document.getElementById('modalCrearProductoRapido');
                const modal = bootstrap.Modal.getInstance(modalEl);
                modal.hide();
                form.reset();

                // Asegurar que el modal de solicitudes siga visible o se recupere el scroll
                const modalSolicitud = document.getElementById('modalNuevaSolicitudManual');
                if (modalSolicitud && modalSolicitud.classList.contains('show')) {
                    document.body.classList.add('modal-open');
                }
                
                // Alert suave (opcional)
                // alert('Producto creado y seleccionado');
            } else {
                alert('Error: ' + (data.error || 'No se pudo guardar el producto'));
            }
        })
        .catch(err => {
            console.error(err);
            alert('Error de conexión');
        })
        .finally(() => {
            btn.disabled = false;
            btn.innerText = originalText;
        });
    }
</script>
