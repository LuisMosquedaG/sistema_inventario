<!-- MODAL: CREAR CLIENTE RÁPIDO (Desde Cotizaciones) -->
<div class="modal fade" id="modalCrearClienteRapido" tabindex="-1" aria-hidden="true" style="z-index: 1060;">
    <div class="modal-dialog modal-dialog-centered modal-lg modal-sheet">
        <div class="modal-content">
            
            <div class="modal-header border-bottom bg-light">
                <h5 class="modal-title fw-bold text-dark">
                    <i class="bi bi-person-plus me-2" style="color: #00b8b9;"></i>
                    Nuevo Cliente Rápido
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>

            <div class="modal-body p-3 bg-light">
                <form id="formClienteRapido" method="post" action="{% url 'crear_cliente' %}">
                    {% csrf_token %}
                    <input type="hidden" name="next" value="{{ request.path }}">
                    
                    <!-- SECCIÓN 1: INFORMACIÓN GENERAL -->
                    <div class="card border-0 shadow-sm mb-3">
                        <div class="card-body p-3">
                            <h6 class="text-uppercase text-muted fw-bold mb-3" style="font-size: 0.75rem; letter-spacing: 1px;">Información General</h6>
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label small fw-bold text-secondary">Nombre</label>
                                    <input type="text" name="nombre" class="form-control form-control-sm" placeholder="Nombre(s)" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label small fw-bold text-secondary">Apellidos</label>
                                    <input type="text" name="apellidos" class="form-control form-control-sm" placeholder="Apellidos" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label small fw-bold text-secondary">Razón Social</label>
                                    <input type="text" name="razon_social" class="form-control form-control-sm" placeholder="Opcional">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label small fw-bold text-secondary">RFC</label>
                                    <input type="text" name="rfc" class="form-control form-control-sm font-monospace" placeholder="XAXX010101000">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label small fw-bold text-secondary">Correo Electrónico</label>
                                    <input type="email" name="email" class="form-control form-control-sm" placeholder="ejemplo@correo.com">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label small fw-bold text-secondary">Teléfono</label>
                                    <input type="text" name="telefono" class="form-control form-control-sm" placeholder="555-0123">
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- SECCIÓN 2: CLASIFICACIÓN -->
                    <div class="card border-0 shadow-sm mb-0">
                        <div class="card-body p-3">
                            <h6 class="text-uppercase text-muted fw-bold mb-3" style="font-size: 0.75rem; letter-spacing: 1px;">Clasificación</h6>
                            <div class="row g-2">
                                <div class="col-md-4">
                                    <label class="form-label small fw-bold text-secondary">Estado</label>
                                    <select name="estado" class="form-select form-select-sm">
                                        <option value="activo" selected>Activo</option>
                                        <option value="suspendido">Suspendido</option>
                                        <option value="inactivo">Inactivo</option>
                                    </select>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label small fw-bold text-secondary">Tipo</label>
                                    <select name="tipo" class="form-select form-select-sm">
                                        <option value="prospecto" selected>Prospecto</option>
                                        <option value="cliente_nuevo">Nuevo</option>
                                        <option value="cliente_activo">Activo</option>
                                        <option value="vip">VIP</option>
                                    </select>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label small fw-bold text-secondary">Relación</label>
                                    <select name="relacion" class="form-select form-select-sm">
                                        <option value="directo" selected>Directo</option>
                                        <option value="referido">Referido</option>
                                        <option value="revendedor">Revendedor</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>
                </form>
            </div>

            <div class="modal-footer border-top bg-white py-2">
                <button type="button" class="btn btn-light text-secondary btn-sm" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" onclick="guardarClienteRapido()" class="btn btn-brand btn-sm px-4">Registrar y Volver</button>
            </div>

        </div>
    </div>
</div>

<script>
    function guardarClienteRapido() {
        const form = document.getElementById('formClienteRapido');
        const formData = new FormData(form);
        const btn = event.currentTarget;
        const originalText = btn.innerText;

        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Registrando...';

        fetch(form.action, {
            method: 'POST',
            body: formData,
            headers: {
                'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value,
                'X-Requested-With': 'XMLHttpRequest'
            }
        })
        .then(r => r.json())
        .then(data => {
            if (data.success) {
                // 1. Agregar a la lista de clientes del modal de cotización
                const wrapperC = document.getElementById('wrapperCliente');
                if (wrapperC) {
                    const containerOptions = wrapperC.querySelector('.custom-options');
                    const newOption = document.createElement('span');
                    newOption.className = 'custom-option';
                    newOption.setAttribute('data-value', data.id);
                    
                    const nombreComp = `${formData.get('nombre')} ${formData.get('apellidos')}`;
                    const razonS = formData.get('razon_social');
                    
                    newOption.setAttribute('data-search', `${razonS} ${nombreComp}`);
                    
                    let innerH = "";
                    if (razonS) {
                        innerH = `<span class="opt-razon">${razonS}</span><span class="opt-separator">|</span><span class="opt-contacto">${nombreComp}</span>`;
                    } else {
                        innerH = `<span class="opt-razon">${nombreComp}</span><span class="opt-separator">|</span><span class="opt-contacto">Persona Física</span>`;
                    }
                    newOption.innerHTML = innerH;

                    containerOptions.insertBefore(newOption, containerOptions.firstChild);
                    
                    // 2. Simular selección (usando mousedown como en cotizaciones.js)
                    const mdown = new MouseEvent('mousedown', { bubbles: true, cancelable: true });
                    newOption.dispatchEvent(mdown);
                }

                // 3. Cerrar modal y limpiar
                const modalEl = document.getElementById('modalCrearClienteRapido');
                const modal = bootstrap.Modal.getInstance(modalEl);
                modal.hide();
                form.reset();
            } else {
                alert('Error: ' + (data.error || 'No se pudo registrar el cliente'));
            }
        })
        .catch(err => {
            console.error(err);
            alert('Error de conexión');
        })
        .finally(() => {
            btn.disabled = false;
            btn.innerText = originalText;
        });
    }
</script>
