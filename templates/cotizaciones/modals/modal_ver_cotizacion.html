<!-- MODAL: VER COTIZACIÓN -->
<div class="modal fade" id="modalVerCotizacion" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg modal-sheet modal-dialog-scrollable">
        <div class="modal-content">
            
            <!-- HEADER -->
            <div class="modal-header border-bottom bg-light">
                <h5 class="modal-title fw-bold text-dark">
                    <i class="bi bi-eye me-2" style="color: #00b8b9;"></i>
                    Detalle de Cotización <span id="ver_folio"></span>
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>

            <div class="modal-body p-3 bg-light">
                
                <!-- SECCIÓN 1: DATOS DE LA COTIZACIÓN -->
                <div class="card border-0 shadow-sm mb-3" style="border-left: 4px solid #00b8b9 !important;">
                    <div class="card-body p-3">
                        <h6 class="text-uppercase text-muted fw-bold mb-3" style="font-size: 0.75rem; letter-spacing: 1px;">Datos de la Cotización</h6>
                        <div class="row g-3">
                            
                            <div class="col-md-3">
                                <label class="form-label small fw-bold text-secondary mb-0">Cliente</label>
                                <div id="ver_cliente" class="text-dark fw-semibold">--</div>
                            </div>

                            <div class="col-md-3">
                                <label class="form-label small fw-bold text-secondary mb-0">Contacto</label>
                                <div id="ver_contacto" class="text-dark fw-semibold">--</div>
                            </div>

                            <div class="col-md-2">
                                <label class="form-label small fw-bold text-secondary mb-0">Fecha Cot.</label>
                                <div id="ver_fecha_inicio" class="text-dark">--</div>
                            </div>
                            
                            <div class="col-md-2">
                                <label class="form-label small fw-bold text-secondary mb-0">Vence</label>
                                <div id="ver_fecha_fin" class="text-dark">--</div>
                            </div>

                            <div class="col-md-2">
                                <label class="form-label small fw-bold text-secondary mb-0">Origen</label>
                                <div id="ver_origen" class="text-dark">--</div>
                            </div>

                            <div class="col-md-12">
                                <label class="form-label small fw-bold text-secondary mb-0">Dirección</label>
                                <div id="ver_direccion" class="text-dark">--</div>
                            </div>

                        </div>
                    </div>
                </div>

                <!-- SECCIÓN 2: LISTADO DE ARTÍCULOS -->
                <div class="card border-0 shadow-sm">
                    <div class="card-body p-0">
                        <h6 class="text-uppercase text-muted fw-bold p-3 mb-0" style="font-size: 0.75rem; letter-spacing: 1px;">Listado de Artículos a Cotizar</h6>
                        <div class="table-responsive">
                            <table class="table table-sm table-hover mb-0 align-middle">
                                <thead class="table-light">
                                    <tr>
                                        <th class="ps-3">Artículo</th>
                                        <th class="text-center" style="width: 100px;">Cantidad</th>
                                        <th class="text-end" style="width: 120px;">Precio</th>
                                        <th class="text-end pe-3" style="width: 120px;">Total</th>
                                    </tr>
                                </thead>
                                <tbody id="ver_tabla_cuerpo">
                                    <!-- JS insertará filas aquí -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                    <div class="card-footer bg-white border-0 py-3 d-flex justify-content-end">
                        <div class="me-3 mt-1">
                            <span class="text-muted fw-bold text-uppercase" style="font-size: 0.7rem; letter-spacing: 1px;">Suma Total:</span>
                        </div>
                        <div class="fw-bold fs-4 text-success" id="ver_gran_total">$0.00</div>
                    </div>
                </div>

            </div>

            <!-- FOOTER -->
            <div class="modal-footer border-top bg-white d-flex justify-content-between">
                <a href="#" id="ver_imprimir_btn" target="_blank" class="btn btn-brand btn-sm px-4 text-white">
                    <i class="bi bi-printer me-2"></i>Imprimir
                </a>
                <button type="button" class="btn btn-light text-secondary btn-sm px-4" data-bs-dismiss="modal">Cerrar</button>
            </div>

        </div>
    </div>
</div>
