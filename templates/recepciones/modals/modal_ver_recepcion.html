<!-- MODAL: VER RECEPCIÓN -->
<div class="modal fade" id="modalVerRecepcion" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg modal-sheet">
        <div class="modal-content">
            
            <!-- HEADER -->
            <div class="modal-header border-bottom bg-light">
                <h5 class="modal-title fw-bold text-dark">
                    <i class="bi bi-eye me-2" style="color: #00b8b9;"></i>
                    Detalle de Recepción <span id="ver_rec_folio"></span>
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>

            <div class="modal-body p-3 bg-light">
                
                <!-- SECCIÓN 1: DATOS DE COMPRA -->
                <div class="card border-0 shadow-sm mb-3">
                    <div class="card-body p-3">
                        <h6 class="text-uppercase text-muted fw-bold mb-3" style="font-size: 0.75rem; letter-spacing: 1px;">Datos de Compra</h6>
                        <div class="row g-3">
                            <div class="col-md-4">
                                <label class="form-label small fw-bold text-secondary mb-0">Proveedor</label>
                                <div id="ver_rec_proveedor" class="text-dark fw-semibold">--</div>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label small fw-bold text-secondary mb-0">Sucursal de Proveedor</label>
                                <div id="ver_rec_sucursal" class="text-dark fw-semibold">--</div>
                            </div>
                            <div class="col-md-2">
                                <label class="form-label small fw-bold text-secondary mb-0">Folio OC</label>
                                <div id="ver_rec_oc_folio" class="text-dark fw-semibold">--</div>
                            </div>
                            <div class="col-md-2">
                                <label class="form-label small fw-bold text-secondary mb-0">Fecha OC</label>
                                <div id="ver_rec_oc_fecha" class="text-dark">--</div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- SECCIÓN 2: DATOS DE RECEPCIÓN -->
                <div class="card border-0 shadow-sm mb-3" style="border-left: 4px solid #00b8b9 !important;">
                    <div class="card-body p-3">
                        <h6 class="text-uppercase text-muted fw-bold mb-3" style="font-size: 0.75rem; letter-spacing: 1px;">Datos de Recepción</h6>
                        <div class="row g-3">
                            <div class="col-md-3">
                                <label class="form-label small fw-bold text-secondary mb-0">Almacén</label>
                                <div id="ver_rec_almacen" class="text-dark">--</div>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label small fw-bold text-secondary mb-0">Fecha de Recepción</label>
                                <div id="ver_rec_fecha" class="text-dark">--</div>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label small fw-bold text-secondary mb-0">Folio Fact/Rem</label>
                                <div id="ver_rec_factura" class="text-dark">--</div>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label small fw-bold text-secondary mb-0">Fecha Fact/Rem</label>
                                <div id="ver_rec_fecha_fact" class="text-dark">--</div>
                            </div>

                            <div class="col-md-4">
                                <label class="form-label small fw-bold text-secondary mb-0">Pedimento</label>
                                <div id="ver_rec_pedimento" class="text-dark">--</div>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label small fw-bold text-secondary mb-0">Fecha Pedimento</label>
                                <div id="ver_rec_fecha_ped" class="text-dark">--</div>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label small fw-bold text-secondary mb-0">Aduana</label>
                                <div id="ver_rec_aduana" class="text-dark">--</div>
                            </div>
                        </div>
                        <div class="mt-2" style="display: none;"> <!-- Folio de recepción oculto si no es necesario mostrarlo dos veces -->
                            <div id="ver_rec_folio_val"></div>
                        </div>
                    </div>
                </div>

                <!-- SECCIÓN 3: LISTADO DE ARTÍCULOS -->
                <div class="card border-0 shadow-sm">
                    <div class="card-body p-0">
                        <h6 class="text-uppercase text-muted fw-bold p-3 mb-0" style="font-size: 0.75rem; letter-spacing: 1px;">Listado de Artículos</h6>
                        <div class="table-responsive">
                            <table class="table table-sm table-hover mb-0 align-middle">
                                <thead class="table-light">
                                    <tr>
                                        <th class="ps-3">Artículo</th>
                                        <th class="text-center" style="width: 100px;">Cantidad</th>
                                        <th class="text-end" style="width: 120px;">Costo Unit.</th>
                                        <th class="text-end pe-3" style="width: 120px;">Subtotal</th>
                                    </tr>
                                </thead>
                                <tbody id="ver_rec_tabla_cuerpo">
                                    <!-- JS insertará filas aquí -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                    <div class="card-footer bg-white border-0 py-3 d-flex justify-content-end">
                        <div class="me-3 mt-1">
                            <span class="text-muted fw-bold text-uppercase" style="font-size: 0.7rem; letter-spacing: 1px;">Total Recibido:</span>
                        </div>
                        <div class="fw-bold fs-4 text-success" id="ver_rec_gran_total">$0.00</div>
                    </div>
                </div>

            </div>

            <!-- FOOTER -->
            <div class="modal-footer border-top bg-white">
                <button type="button" class="btn btn-light text-secondary btn-sm px-4" data-bs-dismiss="modal">Cerrar</button>
            </div>

        </div>
    </div>
</div>
