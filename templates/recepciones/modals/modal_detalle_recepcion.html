    <div class="modal fade" id="modalDetalleRecepcion" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-xl modal-sheet">
            <div class="modal-content">
                <!-- HEADER -->
                <div class="modal-header border-bottom bg-light">
                    <h5 class="modal-title fw-bold text-dark">
                        <i class="bi bi-eye me-2" style="color: #00b8b9;"></i>
                        <span id="recModalTitleText">Detalle de Recepción</span>
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                
                <div class="modal-body p-3 bg-light">
                    
                    <!-- SECCIÓN 1: DATOS GENERALES -->
                    <div class="card border-0 shadow-sm mb-3">
                        <div class="card-body p-3">
                            <h6 class="text-uppercase text-muted fw-bold mb-3" style="font-size: 0.75rem; letter-spacing: 1px;">Datos de la Recepción</h6>
                            
                            <div class="row g-3 align-items-center">
                                <!-- Proveedor -->
                                <div class="col-md-4">
                                    <label class="small text-muted mb-1 d-block">Proveedor</label>
                                    <div class="text-dark" id="recModalProveedor">-</div>
                                </div>
                                
                                <!-- OC Folio -->
                                <div class="col-md-2">
                                    <label class="small text-muted mb-1 d-block">Folio OC</label>
                                    <div class="text-dark" id="recModalOC">-</div>
                                </div>

                                <!-- Fecha -->
                                <div class="col-md-3">
                                    <label class="small text-muted mb-1 d-block">Fecha</label>
                                    <div class="text-dark" id="recModalFecha">-</div>
                                </div>

                                <!-- Estado -->
                                <div class="col-md-3">
                                    <label class="small text-muted mb-1 d-block">Estado</label>
                                    <span id="recModalEstado" class="status-pill status-pendiente">Estado</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- SECCIÓN 2: LOGÍSTICA (ESTÁTICA) -->
                    <div class="card border-0 shadow-sm mb-3" id="recCardLogistica" style="display:none; border-left: 4px solid #00b8b9 !important;">
                        <div class="card-body p-3">
                            <h6 class="text-uppercase text-muted fw-bold mb-3" style="font-size: 0.75rem; letter-spacing: 1px;">Logística y Aduana</h6>
                            
                            <div class="row g-2">
                                <div class="col-md-6">
                                    <label class="small text-muted mb-0">Almacén</label>
                                    <div class="text-dark small" id="recModalAlmacen">-</div>
                                </div>
                                <div class="col-md-6">
                                    <label class="small text-muted mb-0">Factura/Remision</label>
                                    <div class="text-dark small" id="recModalFactura">-</div>
                                </div>
                                <div class="col-md-4">
                                    <label class="small text-muted mb-0">Pedimento</label>
                                    <div class="text-dark small font-monospace" id="recModalPedimento">-</div>
                                </div>
                                <div class="col-md-4">
                                    <label class="small text-muted mb-0">Aduana</label>
                                    <div class="text-dark small" id="recModalAduana">-</div>
                                </div>
                                <div class="col-md-4">
                                    <label class="small text-muted mb-0">Fecha Pedimento</label>
                                    <div class="text-dark small" id="recModalFechaPedimento">-</div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- SECCIÓN 3: PARTIDAS (TABLA) -->
                    <div class="card border-0 shadow-sm">
                        <div class="card-body p-2">
                            <h6 class="text-uppercase text-muted fw-bold mb-2" style="font-size: 0.75rem; letter-spacing: 1px;">Partidas Recibidas</h6>
                            <div class="table-responsive">
                                <table class="table table-sm table-hover mb-0 align-middle">
                                    <thead class="table-light">
                                        <tr>
                                            <th class="ps-3 fw-normal text-muted text-center" style="font-size: 0.8rem;">Artículo</th>
                                            <th class="text-center fw-normal text-muted" style="font-size: 0.8rem; width: 80px;">Cant.</th>
                                            <th class="text-center fw-normal text-muted" style="font-size: 0.8rem; width: 100px;">Costo</th>
                                            <th class="text-center fw-normal text-muted" style="font-size: 0.8rem; width: 100px;">Total</th>
                                        </tr>
                                    </thead>
                                    <tbody id="recModalTableBody"></tbody>
                                    <tfoot class="bg-light border-top">
                                        <tr>
                                            <td colspan="3" class="text-end text-muted small pt-2">Total Recepción:</td>
                                            <td class="text-end fw-bold text-success pe-3 pt-2" id="recModalTotal">$0.00</td>
                                        </tr>
                                    </tfoot>
                                </table>
                            </div>
                        </div>
                    </div>

                </div>

                <!-- FOOTER -->
                <div class="modal-footer border-top bg-white">
                    <button type="button" id="btnCancelarRecepcion" 
                            class="btn btn-danger btn-sm me-auto" 
                            style="display:none;" 
                            onclick="confirmarCancelarRecepcion()">
                        <i class="bi bi-trash3 me-1"></i> Cancelar Recepción
                    </button>
                    <button type="button" class="btn btn-light text-secondary btn-sm" data-bs-dismiss="modal">Cerrar</button>
                </div>
            </div>
        </div>
    </div>
