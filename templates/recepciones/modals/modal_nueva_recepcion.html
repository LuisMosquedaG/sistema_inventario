    <div class="modal fade" id="modalNuevaRecepcion" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-xl modal-sheet modal-dialog-scrollable">
            <form id="formRecepcion" method="post" action="{% url 'crear_recepcion' %}" novalidate class="modal-content">
                {% csrf_token %}
                <!-- HEADER -->
                <div class="modal-header border-bottom bg-light">
                    <h5 class="modal-title fw-bold text-dark">
                        <i class="bi bi-box-seam-fill me-2" style="color: #00b8b9;"></i>
                        Registrar Recepción de Mercancía
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>

                <div class="modal-body p-3 bg-light">

                    <!-- SECCIÓN 1: DATOS DE CABECERA -->
                    <div class="card border-0 shadow-sm mb-3">
                        <div class="card-body p-3">
                            <h6 class="text-uppercase text-muted fw-bold mb-3">Datos de Entrada</h6>
                            <!-- LÍNEA 1: BASE -->
                            <div class="row g-2">
                                <div class="col-md-4">
                                    <label class="form-label small fw-bold text-secondary">Orden de Compra</label>
                                    <select id="selectOrdenCompra" name="orden_compra" class="form-select form-select-sm" required onchange="cargarItemsOrdenCompra()">
                                        <option value="" selected>Seleccionar...</option>
                                        {% for oc in ordenes_compra_aprobadas %}
                                        <option value="{{ oc.id }}" 
                                                data-almacen="{{ oc.almacen_destino.id|default:'' }}" 
                                                data-proveedor="{{ oc.proveedor.id }}">
                                            OC-{{ oc.id|stringformat:"04d" }} - {{ oc.proveedor }}
                                        </option>
                                        {% endfor %}
                                    </select>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label small fw-bold text-secondary">Almacén</label>
                                    <select name="almacen" id="selectAlmacen" class="form-select form-select-sm" required>
                                        <option value="" selected>Seleccione...</option>
                                        {% for a in almacenes %}
                                        <option value="{{ a.id }}">{{ a.nombre }}</option>
                                        {% endfor %}
                                    </select>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label small fw-bold text-secondary">Fecha de Recepción</label>
                                    <input type="date" name="fecha" class="form-control form-control-sm" required value="{% now 'Y-m-d' %}">
                                </div>
                            </div>

                            <!-- LÍNEA 2: COMPROBANTES Y MONEDA -->
                            <div class="row g-2 mt-2">
                                <div class="col-md-3">
                                    <label class="form-label small fw-bold text-secondary">Folio de Comprobantes</label>
                                    <input type="text" name="factura" class="form-control form-control-sm" placeholder="# Comprobante">
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label small fw-bold text-secondary">Fecha de Comprobante</label>
                                    <input type="date" name="fecha_comprobante" class="form-control form-control-sm" value="{% now 'Y-m-d' %}">
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label small text-muted">Moneda</label>
                                    <input type="text" id="dispMonedaOC" class="form-control form-control-sm bg-light" readonly placeholder="-">
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label small text-muted">TC Pactado</label>
                                    <input type="text" id="dispTipoCambioOC" class="form-control form-control-sm bg-light" readonly placeholder="-">
                                </div>
                            </div>

                            <!-- LÍNEA 3: ADUANA / PEDIMENTO -->
                            <div class="row g-2 mt-2">
                                <div class="col-md-3">
                                    <label class="form-label small text-muted">Pedimento</label>
                                    <input type="text" name="pedimento" class="form-control form-control-sm" placeholder="Núm. Pedimento">
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label small text-muted">Aduana</label>
                                    <input type="text" name="aduana" class="form-control form-control-sm" placeholder="Nombre Aduana">
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label small text-muted">Fecha Pedimento</label>
                                    <input type="date" name="fecha_pedimento" class="form-control form-control-sm">
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label small text-muted">Importación</label>
                                    <input type="number" step="0.01" name="importe_aduana" class="form-control form-control-sm" placeholder="0.00">
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- SECCIÓN 2: LISTA DE RECEPCIÓN -->
                    <div class="card border-0 shadow-sm" style="border-left: 4px solid #00b8b9 !important;">
                        <div class="card-body p-3">
                            <h6 class="text-uppercase text-muted fw-bold mb-3" style="font-size: 0.75rem; letter-spacing: 1px;">Detalle de Mercancía Recibida</h6>
                            <div class="table-responsive">
                                <table class="table table-sm table-hover mb-0 align-middle" style="table-layout: fixed;">
                                    <thead class="table-light">
                                        <tr>
                                            <th class="ps-3" style="width: 28%;">Producto</th>
                                            <th class="text-center" style="width: 10%;">Ordenada</th>
                                            <th class="text-center" style="width: 22%;">Recibir</th>
                                            <th class="text-end" style="width: 10%;">Costo</th>
                                            <th class="text-end" style="width: 10%;">Subtotal</th>
                                            <th class="text-end" style="width: 10%;">IVA</th>
                                            <th class="text-end pe-3" style="width: 10%;">Importe</th>
                                        </tr>
                                    </thead>
                                    <tbody id="tablaCuerpoRecepcion"></tbody>
                                </table>
                            </div>
                            <div id="mensajeVacioRecepcion" class="text-center py-4 text-muted small fst-italic bg-white border border-dashed rounded">
                                Seleccione una Orden de Compra para cargar los productos.
                            </div>
                        </div>
                        <div class="card-footer bg-white border-0 py-3">
                            <div class="row justify-content-end">
                                <div class="col-md-5">
                                    <div class="d-flex justify-content-between mb-1">
                                        <span class="text-muted small">Subtotal:</span>
                                        <span class="fw-semibold text-dark" id="recepcionSubtotal">$0.00</span>
                                    </div>
                                    <div class="d-flex justify-content-between mb-2 pb-2 border-bottom">
                                        <span class="text-muted small">IVA:</span>
                                        <span class="fw-semibold text-dark" id="recepcionIvaTotal">$0.00</span>
                                    </div>
                                    <div class="d-flex justify-content-between align-items-center">
                                        <span class="text-muted fw-bold small uppercase">Total Recibido:</span>
                                        <span class="fw-bold fs-5 text-brand" id="granTotalRecepcion">$0.00</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- FOOTER -->
                <div class="modal-footer border-top bg-white">
                    <button type="button" class="btn btn-light text-secondary btn-sm" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-brand btn-sm px-4">Procesar Entrada</button>
                </div>
            </form>
        </div>
    </div>
