<!-- Modal para Ver Detalles de Solicitud -->
<div class="modal fade" id="modalVerSolicitud" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-xl modal-sheet modal-dialog-scrollable">
        <div class="modal-content">
            <!-- HEADER -->
            <div class="modal-header border-bottom bg-light">
                <h5 class="modal-title fw-bold text-dark">
                    <i class="bi bi-eye-fill me-2" style="color: #00b8b9;"></i>
                    Detalle de Solicitud <span id="ver_folio_solicitud" class="text-brand"></span>
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>

            <div class="modal-body p-3 bg-light">
                <!-- CABECERA DE DATOS -->
                <div class="row g-3 mb-3">
                    <div class="col-md-3">
                        <div class="card border-0 shadow-sm h-100">
                            <div class="card-body p-3 text-center">
                                <span class="text-muted small d-block mb-1">Estado</span>
                                <span id="ver_estado_solicitud" class="status-pill"></span>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card border-0 shadow-sm h-100">
                            <div class="card-body p-3 text-center">
                                <span class="text-muted small d-block mb-1">Solicitante</span>
                                <span id="ver_solicitante_solicitud" class="fw-bold text-dark"></span>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card border-0 shadow-sm h-100">
                            <div class="card-body p-3 text-center">
                                <span class="text-muted small d-block mb-1">Fecha</span>
                                <span id="ver_fecha_solicitud" class="fw-bold text-dark"></span>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card border-0 shadow-sm h-100">
                            <div class="card-body p-3 text-center">
                                <span class="text-muted small d-block mb-1">Pedido Origen</span>
                                <span id="ver_pedido_origen" class="fw-bold text-brand"></span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- NOTAS -->
                <div class="card border-0 shadow-sm mb-3">
                    <div class="card-body p-3">
                        <h6 class="text-uppercase text-muted fw-bold mb-2" style="font-size: 0.7rem;">Notas / Justificación</h6>
                        <p id="ver_notas_solicitud" class="mb-0 text-dark small fst-italic"></p>
                    </div>
                </div>

                <!-- TABLA DE PRODUCTOS -->
                <div class="card border-0 shadow-sm">
                    <div class="card-body p-3">
                        <h6 class="text-uppercase text-muted fw-bold mb-3" style="font-size: 0.7rem;">Ítems Solicitados</h6>
                        <div class="table-responsive">
                            <table class="table table-sm table-hover align-middle mb-0">
                                <thead class="table-light">
                                    <tr style="font-size: 0.75rem;">
                                        <th>Producto</th>
                                        <th class="text-center">Cant.</th>
                                        <th>Proveedor</th>
                                        <th>Almacén</th>
                                        <th class="text-end">Costo</th>
                                        <th class="text-center">T.C.</th>
                                        <th class="text-end">Subtotal</th>
                                        <th class="text-end">IVA</th>
                                        <th class="text-end pe-3">Importe</th>
                                    </tr>
                                </thead>
                                <tbody id="cuerpoVerSolicitud">
                                    <!-- Se llena vía JS -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                    <div class="card-footer bg-white border-0 py-3">
                        <div class="row justify-content-end">
                            <div class="col-md-5">
                                <div class="d-flex justify-content-between mb-1">
                                    <span class="text-muted small">Subtotal:</span>
                                    <span class="fw-semibold text-dark" id="ver_solicitud_subtotal">$0.00</span>
                                </div>
                                <div class="d-flex justify-content-between mb-2 pb-2 border-bottom">
                                    <span class="text-muted small">IVA:</span>
                                    <span class="fw-semibold text-dark" id="ver_solicitud_iva_total">$0.00</span>
                                </div>
                                <div class="d-flex justify-content-between align-items-center">
                                    <span class="text-muted fw-bold small uppercase">Total Solicitud:</span>
                                    <span class="fw-bold fs-4 text-brand" id="ver_total_solicitud">$0.00</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- FOOTER -->
            <div class="modal-footer border-top bg-white">
                <button type="button" class="btn btn-brand btn-sm text-white px-4" data-bs-dismiss="modal">Cerrar</button>
            </div>
        </div>
    </div>
</div>

<style>
    .text-brand { color: #00b8b9 !important; }
</style>
