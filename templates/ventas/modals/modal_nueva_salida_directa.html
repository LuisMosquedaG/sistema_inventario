<!-- MODAL: NUEVA SALIDA DIRECTA (VENTA) -->
<div class="modal fade" id="modalNuevaSalidaDirecta" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg modal-sheet">
        <div class="modal-content">
            
            <!-- HEADER -->
            <div class="modal-header border-bottom bg-light">
                <h5 class="modal-title fw-bold text-dark">
                    <i class="bi bi-box-arrow-right me-2" style="color: #00b8b9;"></i>
                    Nueva Salida Directa
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>

            <form id="formSalidaDirecta" method="post" action="{% url 'crear_salida_directa' %}" novalidate>
                {% csrf_token %}
                
                <div class="modal-body p-3 bg-light">
                    
                    <!-- SECCIÓN 1: CLIENTE -->
                    <div class="card border-0 shadow-sm mb-3">
                        <div class="card-body p-3">
                            <h6 class="text-uppercase text-muted fw-bold mb-3" style="font-size: 0.75rem; letter-spacing: 1px;">Información del Cliente</h6>
                            <div class="row g-2">
                                <div class="col-md-12">
                                    <label class="form-label small fw-bold text-secondary">Cliente</label>
                                    <select name="cliente" class="form-select form-select-sm" required>
                                        <option value="" selected disabled>Seleccionar cliente...</option>
                                        {% for c in clientes %}
                                        <option value="{{ c.id }}">{{ c.razon_social|default:c.nombre_completo }}</option>
                                        {% endfor %}
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- SECCIÓN 2: AGREGAR ARTÍCULO -->
                    <div class="card border-0 shadow-sm mb-3" style="border-left: 4px solid #00b8b9 !important;">
                        <div class="card-body p-3">
                            <h6 class="text-uppercase text-muted fw-bold mb-3" style="font-size: 0.75rem; letter-spacing: 1px;">Agregar Artículo</h6>
                            
                            <div class="row g-2 align-items-end">
                                <div class="col-md-5">
                                    <label class="form-label small text-muted">Producto</label>
                                    <select id="selectProductoSalida" class="form-select form-select-sm">
                                        <option value="" selected disabled>Seleccionar...</option>
                                        {% for p in productos %}
                                        <option value="{{ p.id }}" data-precio="{{ p.precio_venta }}">{{ p.nombre }}</option>
                                        {% endfor %}
                                    </select>
                                </div>
                                <div class="col-md-2">
                                    <label class="form-label small text-muted">Cant.</label>
                                    <input type="number" id="inputCantidadSalida" class="form-control form-control-sm text-center" value="1" min="1">
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label small text-muted">Precio Unit.</label>
                                    <div class="input-group input-group-sm">
                                        <span class="input-group-text">$</span>
                                        <input type="number" id="inputPrecioSalida" class="form-control form-control-sm" value="0.00" step="0.01">
                                    </div>
                                </div>
                                <div class="col-md-2">
                                    <button type="button" class="btn btn-brand btn-sm w-100" onclick="agregarAListaSalida()">
                                        <i class="bi bi-plus-lg"></i> Agregar
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- SECCIÓN 3: TABLA DE ARTÍCULOS -->
                    <div class="card border-0 shadow-sm">
                        <div class="card-body p-0">
                            <table class="table table-sm table-hover mb-0 align-middle">
                                <thead class="table-light">
                                    <tr>
                                        <th class="ps-3">Artículo</th>
                                        <th class="text-center" style="width: 80px;">Cant.</th>
                                        <th class="text-end" style="width: 100px;">Precio</th>
                                        <th class="text-end" style="width: 100px;">Total</th>
                                        <th style="width: 50px;"></th>
                                    </tr>
                                </thead>
                                <tbody id="tablaCuerpoSalida">
                                    <!-- JS insertará filas aquí -->
                                </tbody>
                            </table>
                            <div id="mensajeVacioSalida" class="text-center py-3 text-muted small fst-italic">
                                No hay artículos agregados aún.
                            </div>
                        </div>
                        <div class="card-footer bg-white border-0 py-2 d-flex justify-content-end">
                            <div class="me-3">
                                <span class="text-muted small">Total Salida:</span>
                            </div>
                            <div class="fw-bold fs-5 text-success" id="granTotalSalida">$0.00</div>
                        </div>
                    </div>

                </div>

                <!-- FOOTER -->
                <div class="modal-footer border-top bg-white">
                    <button type="button" class="btn btn-light text-secondary btn-sm" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-brand btn-sm px-4">Guardar Salida</button>
                </div>

            </form>
        </div>
    </div>
</div>
