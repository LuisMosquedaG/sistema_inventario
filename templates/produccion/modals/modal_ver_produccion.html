<!-- MODAL: VER ORDEN DE PRODUCCIÓN -->
<div class="modal fade" id="modalVerOrdenProduccion" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg modal-sheet">
        <div class="modal-content">
            
            <!-- HEADER -->
            <div class="modal-header border-bottom bg-light">
                <h5 class="modal-title fw-bold text-dark">
                    <i class="bi bi-eye me-2" style="color: #00b8b9;"></i>
                    Detalle de Orden de Producción <span id="ver_op_folio"></span>
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>

            <div class="modal-body p-3 bg-light">
                
                <!-- SECCIÓN 1: PRODUCTO A PRODUCCIÓN -->
                <div class="card border-0 shadow-sm mb-3" style="border-left: 4px solid #00b8b9 !important;">
                    <div class="card-body p-3">
                        <h6 class="text-uppercase text-muted fw-bold mb-3" style="font-size: 0.75rem; letter-spacing: 1px;">Producto a Producción</h6>
                        <div class="row g-3">
                            
                            <div class="col-md-6">
                                <label class="form-label small fw-bold text-secondary mb-0">Artículo</label>
                                <div id="ver_op_producto" class="text-dark fw-semibold fs-6">--</div>
                            </div>

                            <div class="col-md-3">
                                <label class="form-label small fw-bold text-secondary mb-0">Cantidad</label>
                                <div id="ver_op_cantidad" class="text-dark fw-bold fs-6">--</div>
                            </div>

                            <div class="col-md-3">
                                <label class="form-label small fw-bold text-secondary mb-0">Folio de Pedido</label>
                                <div id="ver_op_pedido" class="text-brand fw-bold">--</div>
                            </div>

                            <div class="col-md-4">
                                <label class="form-label small fw-bold text-secondary mb-0">Estado</label>
                                <div>
                                    <span id="ver_op_estado" class="status-pill">--</span>
                                </div>
                            </div>

                            <div class="col-md-8">
                                <label class="form-label small fw-bold text-secondary mb-1">Avance del Proceso</label>
                                <div class="row g-2">
                                    <div class="col-6">
                                        <div class="d-flex justify-content-between align-items-center">
                                            <span class="progress-label">Proceso</span>
                                            <span class="progress-label text-dark" id="ver_op_avance_proceso_pct">0%</span>
                                        </div>
                                        <div class="progress-slim">
                                            <div class="progress-bar bg-brand-avance" id="ver_op_avance_proceso_bar" style="width: 0%"></div>
                                        </div>
                                    </div>
                                    <div class="col-6">
                                        <div class="d-flex justify-content-between align-items-center">
                                            <span class="progress-label">Calidad</span>
                                            <span class="progress-label text-dark" id="ver_op_avance_calidad_pct">0%</span>
                                        </div>
                                        <div class="progress-slim">
                                            <div class="progress-bar bg-info-avance" id="ver_op_avance_calidad_bar" style="width: 0%"></div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="col-md-12">
                                <label class="form-label small fw-bold text-secondary mb-0">Notas</label>
                                <div id="ver_op_notas" class="text-dark small">--</div>
                            </div>

                        </div>
                    </div>
                </div>

                <!-- SECCIÓN 2: MATERIALES Y COMPONENTES -->
                <div class="card border-0 shadow-sm">
                    <div class="card-body p-0">
                        <h6 class="text-uppercase text-muted fw-bold p-3 mb-0" style="font-size: 0.75rem; letter-spacing: 1px;">Materiales y Componentes</h6>
                        <div class="table-responsive">
                            <table class="table table-sm table-hover mb-0 align-middle">
                                <thead class="table-light">
                                    <tr>
                                        <th class="ps-3">Componente</th>
                                        <th class="text-center" style="width: 150px;">Cantidad Requerida</th>
                                    </tr>
                                </thead>
                                <tbody id="ver_op_tabla_materiales">
                                    <!-- JS insertará filas aquí -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

            </div>

            <!-- FOOTER -->
            <div class="modal-footer border-top bg-white">
                <button type="button" class="btn btn-light text-secondary btn-sm px-4" data-bs-dismiss="modal">Cerrar</button>
            </div>

        </div>
    </div>
</div>
