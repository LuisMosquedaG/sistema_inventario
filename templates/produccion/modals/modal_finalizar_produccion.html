<!-- MODAL: FINALIZAR PRODUCCIÓN (INGRESO A INVENTARIO) -->
<div class="modal fade" id="modalFinalizarProduccion" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg modal-sheet">
        <div class="modal-content">
            
            <!-- HEADER -->
            <div class="modal-header border-bottom bg-light">
                <h5 class="modal-title fw-bold text-dark">
                    <i class="bi bi-box-seam-fill me-2" style="color: #00b8b9;"></i>
                    Registrar Recepción de Producción
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>

            <form id="formFinalizarProduccion" method="post">
                {% csrf_token %}
                <input type="hidden" name="orden_id" id="finalizar_orden_id">
                
                <div class="modal-body p-3 bg-light">
                    
                    <!-- SECCIÓN 1: DATOS DE INGRESO -->
                    <div class="card border-0 shadow-sm mb-3">
                        <div class="card-body p-3">
                            <h6 class="text-uppercase text-muted fw-bold mb-3" style="font-size: 0.75rem; letter-spacing: 1px;">1. Datos de Ingreso</h6>
                            <div class="row g-3">
                                <div class="col-md-4">
                                    <label class="form-label small fw-bold text-secondary">Almacén de Entrada</label>
                                    <select name="almacen_id" id="finalizar_almacen_id" class="form-select form-select-sm shadow-none" required>
                                        {% for a in almacenes %}
                                            <option value="{{ a.id }}">{{ a.nombre }}</option>
                                        {% endfor %}
                                    </select>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label small fw-bold text-secondary mb-0">Fecha de Ingreso</label>
                                    <div class="py-1 fw-semibold text-dark">
                                        {% now 'd/m/Y' %}
                                    </div>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label small fw-bold text-secondary mb-0">Usuario Receptor</label>
                                    <div class="py-1 fw-semibold text-dark">
                                        {{ request.user.username }}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- SECCIÓN 2: DETALLE DE PRODUCTO Y TRAZABILIDAD -->
                    <div class="card border-0 shadow-sm">
                        <div class="card-body p-3">
                            <h6 class="text-uppercase text-muted fw-bold mb-3" style="font-size: 0.75rem; letter-spacing: 1px;">2. Detalle de Producto Terminado</h6>
                            
                            <div class="table-responsive">
                                <table class="table table-sm table-hover align-middle mb-0">
                                    <thead class="table-light">
                                        <tr>
                                            <th>Producto</th>
                                            <th class="text-center" style="width: 100px;">Cantidad</th>
                                            <th>Identificador (Lote / Serie)</th>
                                        </tr>
                                    </thead>
                                    <tbody id="tabla_finalizar_cuerpo">
                                        <!-- Se puebla dinámicamente con JS -->
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                </div>

                <!-- FOOTER -->
                <div class="modal-footer border-top bg-white">
                    <button type="button" class="btn btn-light text-secondary btn-sm px-4" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-brand btn-sm px-4 shadow-sm" id="btnProcesarFinalizacion">
                        <i class="bi bi-check-circle me-1"></i> Procesar Entrada
                    </button>
                </div>

            </form>
        </div>
    </div>
</div>

<script>
/**
 * PUEBLA LA TABLA DE FINALIZACIÓN BASADO EN LA ORDEN Y SUS PROPIEDADES
 */
function prepararModalFinalizacion(data) {
    const cuerpo = document.getElementById('tabla_finalizar_cuerpo');
    const ordenId = document.getElementById('finalizar_orden_id');
    const selectAlmacen = document.getElementById('finalizar_almacen_id');
    
    cuerpo.innerHTML = '';
    ordenId.value = data.id;
    
    // Seleccionar el almacén por defecto
    if (selectAlmacen) selectAlmacen.value = data.almacen_entrada_id;

    let html = '';
    
    // Si maneja SERIE, creamos una fila por cada pieza
    if (data.maneja_serie) {
        for (let i = 1; i <= data.cantidad_producir; i++) {
            html += `
                <tr>
                    <td class="small fw-semibold text-dark">${data.producto_nombre} <span class="text-muted text-xs">#${i}</span></td>
                    <td class="text-center small">1 pz</td>
                    <td>
                        <input type="text" name="serie[]" class="form-control form-control-sm" placeholder="Ingrese No. Serie" required>
                        <input type="hidden" name="item_lote[]" value="">
                    </td>
                </tr>
            `;
        }
    } 
    // Si maneja LOTE, una sola fila para toda la cantidad
    else if (data.maneja_lote) {
        html = `
            <tr>
                <td class="small fw-semibold text-dark">${data.producto_nombre}</td>
                <td class="text-center small">${data.cantidad_producir} pz</td>
                <td>
                    <input type="text" name="lote_global" class="form-control form-control-sm" placeholder="Ingrese Lote de Producción" required>
                    <input type="hidden" name="serie[]" value="">
                </td>
            </tr>
        `;
    }
    // Producto normal (Sin serie ni lote)
    else {
        html = `
            <tr>
                <td class="small fw-semibold text-dark">${data.producto_nombre}</td>
                <td class="text-center small">${data.cantidad_producir} pz</td>
                <td class="text-muted small italic">No requiere trazabilidad especial</td>
            </tr>
        `;
    }

    cuerpo.innerHTML = html;
    
    const modal = new bootstrap.Modal(document.getElementById('modalFinalizarProduccion'));
    modal.show();
}

// Envío del formulario vía AJAX
document.getElementById('formFinalizarProduccion').addEventListener('submit', function(e) {
    e.preventDefault();
    const btn = document.getElementById('btnProcesarFinalizacion');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span> Procesando...';

    const formData = new FormData(this);
    
    fetch('/produccion/api/finalizar-completo/', {
        method: 'POST',
        body: formData,
        headers: {
            'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
        }
    })
    .then(r => r.json())
    .then(data => {
        if (data.success) {
            window.location.reload();
        } else {
            alert("Error: " + data.error);
            btn.disabled = false;
            btn.innerText = 'Procesar Entrada';
        }
    })
    .catch(err => {
        console.error(err);
        alert("Ocurrió un error al procesar la entrada.");
        btn.disabled = false;
        btn.innerText = 'Procesar Entrada';
    });
});
</script>
