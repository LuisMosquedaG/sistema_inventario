<!-- MODAL: VER PEDIDO -->
<div class="modal fade" id="modalVerPedido" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg modal-sheet">
        <div class="modal-content">
            
            <!-- HEADER -->
            <div class="modal-header border-bottom bg-light">
                <h5 class="modal-title fw-bold text-dark">
                    <i class="bi bi-eye me-2" style="color: #00b8b9;"></i>
                    Detalle de Pedido <span id="ver_pedido_folio"></span>
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>

            <div class="modal-body p-3 bg-light">
                
                <!-- SECCIÓN 1: DATOS DEL CLIENTE -->
                <div class="card border-0 shadow-sm mb-3" style="border-left: 4px solid #00b8b9 !important;">
                    <div class="card-body p-3">
                        <h6 class="text-uppercase text-muted fw-bold mb-3" style="font-size: 0.75rem; letter-spacing: 1px;">Datos del Cliente</h6>
                        <div class="row g-3">
                            
                            <div class="col-md-4">
                                <label class="form-label small fw-bold text-secondary mb-0">Cliente</label>
                                <div id="ver_pedido_cliente" class="text-dark fw-semibold">--</div>
                            </div>

                            <div class="col-md-4">
                                <label class="form-label small fw-bold text-secondary mb-0">Contacto</label>
                                <div id="ver_pedido_contacto" class="text-dark fw-semibold">--</div>
                            </div>

                            <div class="col-md-4">
                                <label class="form-label small fw-bold text-secondary mb-0">Teléfono Cliente</label>
                                <div id="ver_pedido_cliente_tel" class="text-dark">--</div>
                            </div>

                            <div class="col-md-4">
                                <label class="form-label small fw-bold text-secondary mb-0">Correo Cliente</label>
                                <div id="ver_pedido_cliente_email" class="text-dark">--</div>
                            </div>

                            <div class="col-md-4">
                                <label class="form-label small fw-bold text-secondary mb-0">Fecha Pedido</label>
                                <div id="ver_pedido_fecha" class="text-dark">--</div>
                            </div>

                            <div class="col-md-4">
                                <label class="form-label small fw-bold text-secondary mb-0">Folio Cotización</label>
                                <div id="ver_pedido_cotizacion" class="text-dark">--</div>
                            </div>

                            <div class="col-md-4">
                                <label class="form-label small fw-bold text-secondary mb-0">Nombre Contacto</label>
                                <div id="ver_pedido_contacto_nom" class="text-dark">--</div>
                            </div>

                            <div class="col-md-4">
                                <label class="form-label small fw-bold text-secondary mb-0">Teléfono Contacto</label>
                                <div id="ver_pedido_contacto_tel" class="text-dark">--</div>
                            </div>

                            <div class="col-md-4">
                                <label class="form-label small fw-bold text-secondary mb-0">Correo Contacto</label>
                                <div id="ver_pedido_contacto_email" class="text-dark">--</div>
                            </div>

                        </div>
                    </div>
                </div>

                <!-- SECCIÓN 2: LISTADO DE ARTÍCULOS -->
                <div class="card border-0 shadow-sm">
                    <div class="card-body p-0">
                        <h6 class="text-uppercase text-muted fw-bold p-3 mb-0" style="font-size: 0.75rem; letter-spacing: 1px;">Listado de Artículos</h6>
                        <div class="table-responsive">
                            <table class="table table-sm table-hover mb-0 align-middle">
                                <thead class="table-light">
                                    <tr>
                                        <th class="ps-3">Nombre Artículo</th>
                                        <th class="text-center" style="width: 120px;">Solicitado</th>
                                        <th class="text-center" style="width: 150px;">Estado</th>
                                    </tr>
                                </thead>
                                <tbody id="ver_pedido_tabla_cuerpo">
                                    <!-- JS insertará filas aquí -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

            </div>

            <!-- FOOTER -->
            <div class="modal-footer border-top bg-white">
                <button type="button" class="btn btn-light text-secondary btn-sm px-4" data-bs-dismiss="modal">Cerrar</button>
            </div>

        </div>
    </div>
</div>
