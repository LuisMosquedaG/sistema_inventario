<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Módulo de Ventas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow">
            <div class="card-header bg-success text-white d-flex justify-content-between align-items-center">
                <h4 class="mb-0">Módulo de Ventas</h4>
                <span class="badge bg-light text-dark">Conectado a Inventario</span>
            </div>
            <div class="card-body">
                
                {% if messages %}
                    {% for message in messages %}
                        <div class="alert alert-{{ message.tags }}">{{ message }}</div>
                    {% endfor %}
                {% endif %}

                <form method="POST">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label">Producto (Desde Inventario)</label>
                        <select name="producto_id" class="form-select" required>
                            <option value="">-- Seleccione --</option>
                            {% for prod in productos %}
                                <option value="{{ prod.id }}">{{ prod.nombre }} (Stock: {{ prod.stock_actual }})</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Cantidad</label>
                            <input type="number" name="cantidad" class="form-control" value="1" min="1" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Cliente</label>
                            <input type="text" name="cliente" class="form-control" placeholder="Nombre del cliente">
                        </div>
                    </div>

                    <button type="submit" class="btn btn-success w-100 btn-lg">Registrar Venta</button>
                </form>
            </div>
        </div>
        <div class="mt-3 text-center">
            <a href="/admin/ventas/venta/" class="btn btn-secondary">Ver Historial de Ventas</a>
        </div>
    </div>
</body>
</html>
